{% extends "base.html" %}


{% block title %}
Register
{% endblock %}



{% block content %}


<div class="auth-page">

    <div class="auth-card">

        <h1>
            Join Kupina
        </h1>

        <p class="auth-subtitle">
            Create your account and discover new movies.
        </p>

        <form method="POST">
            <input
            type="text"
            name="username"
            placeholder="Username"
            required>

            <input
            type="email"
            name="email"
            placeholder="Email"
            required>

            <input
            type="password"
            name="password"
            placeholder="Password"
            required>

            <button type="submit">
                Create Account
            </button>
        </form>

        <p class="auth-footer">
            Already have an account?
            <a href="/login">
                Login
            </a>
        </p>
    </div>
</div>


{% endblock %}
